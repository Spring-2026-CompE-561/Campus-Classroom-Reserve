version: "3.9"
name: campus-classroom-reserve
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    container_name: ccr-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccr_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccr_password}
      POSTGRES_DB: ${POSTGRES_DB:-campus_classroom_reserve}
    ports:
      - "5432:5432"
    # networks:
    #   - app-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccr_user} -d ${POSTGRES_DB:-campus_classroom_reserve}"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ccr-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    # networks:
    #   - app-network
    # network_mode: host
    depends_on:
      - db

volumes:
  postgres_data:

